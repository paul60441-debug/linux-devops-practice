services:
  nginx:
    image: nginx
    container_name: proxy-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - site1
      - site2

  site1:
    image: nginx
    container_name: site1-web
    volumes:
      - ./site1:/usr/share/nginx/html

  site2:
    image: nginx
    container_name: site2-web
    volumes:
      - ./site2:/usr/share/nginx/html
